<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">VTX Labs generated video chat screenshot</title>
  <desc id="desc">A chat interface where the user asks to draw a circle and AnimAI returns a generated circle explanation video.</desc>
  <defs>
    <style>
      .bg { fill: #f4f8fc; }
      .panel { fill: #eef4fa; stroke: #c8d4e2; stroke-width: 1; }
      .blue { fill: #0c8fce; }
      .text { fill: #111827; font-family: Inter, Arial, sans-serif; }
      .muted { fill: #64748b; font-family: Inter, Arial, sans-serif; }
      .card { fill: #f8fafc; }
      .video-side { fill: #cbd3dc; }
      .dark { fill: #020202; }
      .line { stroke: #d5dee9; stroke-width: 1; }
      .white { fill: #ffffff; font-family: Inter, Arial, sans-serif; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1600" height="900"/>

  <rect class="panel" x="0" y="0" width="278" height="900"/>
  <rect class="blue" x="18" y="20" width="242" height="44" rx="6"/>
  <text class="white" x="32" y="42" font-size="23">&#8592;</text>
  <text class="white" x="92" y="45" font-size="16" font-weight="700">+ New Chat</text>

  <text class="text" x="46" y="108" font-size="16">draw a parabola explaining all...</text>
  <rect class="blue" x="8" y="128" width="260" height="44" rx="8"/>
  <text class="white" x="46" y="155" font-size="17" font-weight="700">draw a circle</text>
  <text class="text" x="46" y="204" font-size="16">draw a circle</text>

  <line class="line" x1="278" y1="0" x2="278" y2="900"/>
  <line class="line" x1="0" y1="706" x2="278" y2="706"/>
  <rect x="18" y="725" width="242" height="82" rx="8" fill="#f8fbff" stroke="#c8d4e2"/>
  <text class="text" x="52" y="752" font-size="15">Free videos</text>
  <text class="text" x="219" y="752" font-size="15" font-weight="700">4 / 5</text>
  <rect x="31" y="763" width="216" height="6" rx="3" fill="#1f2937"/>
  <rect x="31" y="763" width="172" height="6" rx="3" fill="#0c8fce"/>
  <text class="text" x="31" y="790" font-size="13">1 remaining</text>
  <rect x="18" y="821" width="242" height="39" rx="6" fill="#f8fbff" stroke="#c8d4e2"/>
  <text class="text" x="66" y="846" font-size="16" font-weight="700">Paid Tier Waitlist</text>
  <text class="text" x="112" y="887" font-size="13" font-weight="700">VtxLabs</text>

  <text class="text" x="591" y="44" font-size="18" font-weight="700">You</text>
  <circle cx="556" cy="45" r="18" fill="#0c8fce"/>
  <text class="text" x="591" y="80" font-size="17">draw a circle</text>
  <text class="text" x="1508" y="44" font-size="16" font-weight="700">Sign Out</text>

  <rect class="card" x="521" y="114" width="835" height="464"/>
  <circle cx="556" cy="157" r="18" fill="#334155"/>
  <text class="text" x="591" y="156" font-size="17" font-weight="700">AnimAI</text>

  <rect class="video-side" x="591" y="175" width="748" height="347" rx="8"/>
  <rect class="dark" x="656" y="175" width="620" height="347"/>
  <text x="880" y="211" font-size="20" font-family="Georgia, serif" font-weight="700" fill="#f8fafc">What a Circle Is</text>
  <circle cx="966" cy="349" r="96" fill="none" stroke="#f8fafc" stroke-width="3"/>
  <circle cx="966" cy="349" r="4" fill="#fff200"/>
  <text x="974" y="367" font-size="18" font-family="Georgia, serif" font-weight="700" fill="#c8c40d">center</text>
  <text class="text" x="591" y="548" font-size="17">Here&apos;s your generated video!</text>

  <line class="line" x1="278" y1="757" x2="1600" y2="757"/>
  <text class="text" x="1117" y="802" font-size="18">English</text>
  <rect x="1162" y="777" width="194" height="39" rx="6" fill="#f8fbff" stroke="#c8d4e2"/>
  <text class="muted" x="1330" y="802" font-size="18">v</text>
  <rect x="521" y="829" width="766" height="62" rx="6" fill="#f8fbff" stroke="#c8d4e2"/>
  <text class="text" x="536" y="857" font-size="17">Describe the video you want to generate...</text>
  <rect x="1301" y="829" width="56" height="57" rx="6" fill="#8fc2e8"/>
  <text x="1321" y="866" font-size="25" fill="#ffffff" font-family="Arial, sans-serif">&#9657;</text>
</svg>
