name: Deploy AnimAI to Hostinger VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        env:
          HOSTINGER_APP_DIR: ${{ vars.HOSTINGER_APP_DIR }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEMANTIC_CACHE_ENABLED: ${{ vars.SEMANTIC_CACHE_ENABLED }}
          CHROMA_OPENAI_API_KEY: ${{ secrets.CHROMA_OPENAI_API_KEY }}
          CHROMA_OPENAI_EMBEDDING_MODEL: ${{ vars.CHROMA_OPENAI_EMBEDDING_MODEL }}
          CHROMA_API_KEY: ${{ secrets.CHROMA_API_KEY }}
          CHROMA_HOST: ${{ vars.CHROMA_HOST }}
          CHROMA_TENANT: ${{ vars.CHROMA_TENANT }}
          CHROMA_DATABASE: ${{ vars.CHROMA_DATABASE }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ vars.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ vars.R2_PUBLIC_BASE_URL }}
          SKIP_UPLOAD: ${{ vars.SKIP_UPLOAD }}
          PUBLIC_MEDIA_BASE_URL: ${{ vars.PUBLIC_MEDIA_BASE_URL }}
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL: ${{ vars.LANGFUSE_BASE_URL }}
          LANGFUSE_HOST: ${{ vars.LANGFUSE_HOST }}
          LANGFUSE_TIMEOUT: ${{ vars.LANGFUSE_TIMEOUT }}
          LANGFUSE_FLUSH_AT: ${{ vars.LANGFUSE_FLUSH_AT }}
          LANGFUSE_FLUSH_INTERVAL: ${{ vars.LANGFUSE_FLUSH_INTERVAL }}
          LANGFUSE_TRACING_ENVIRONMENT: ${{ vars.LANGFUSE_TRACING_ENVIRONMENT }}
          LANGFUSE_AUTH_CHECK_ON_STARTUP: ${{ vars.LANGFUSE_AUTH_CHECK_ON_STARTUP }}
          MANIM_RENDER_TIMEOUT_SECONDS: ${{ vars.MANIM_RENDER_TIMEOUT_SECONDS }}
          MANIM_QUALITY_FLAG: ${{ vars.MANIM_QUALITY_FLAG }}
          KEEP_RENDER_ARTIFACTS: ${{ vars.KEEP_RENDER_ARTIFACTS }}
        with:
          host: ${{ secrets.HOSTINGER_HOST }}
          username: ${{ secrets.HOSTINGER_USER }}
          key: ${{ secrets.HOSTINGER_SSH_KEY }}
          port: 22
          envs: HOSTINGER_APP_DIR,OPENAI_API_KEY,SEMANTIC_CACHE_ENABLED,CHROMA_OPENAI_API_KEY,CHROMA_OPENAI_EMBEDDING_MODEL,CHROMA_API_KEY,CHROMA_HOST,CHROMA_TENANT,CHROMA_DATABASE,R2_ACCOUNT_ID,R2_ACCESS_KEY_ID,R2_SECRET_ACCESS_KEY,R2_BUCKET,R2_PUBLIC_BASE_URL,SKIP_UPLOAD,PUBLIC_MEDIA_BASE_URL,LANGFUSE_PUBLIC_KEY,LANGFUSE_SECRET_KEY,LANGFUSE_BASE_URL,LANGFUSE_HOST,LANGFUSE_TIMEOUT,LANGFUSE_FLUSH_AT,LANGFUSE_FLUSH_INTERVAL,LANGFUSE_TRACING_ENVIRONMENT,LANGFUSE_AUTH_CHECK_ON_STARTUP,MANIM_RENDER_TIMEOUT_SECONDS,MANIM_QUALITY_FLAG,KEEP_RENDER_ARTIFACTS
          script: |
            set -eu

            APP_DIR="${HOSTINGER_APP_DIR:-/opt/animai}"
            REPO_URL="https://github.com/pushpitkamboj/AnimAI.git"
            mkdir -p "$(dirname "$APP_DIR")"

            if [ ! -d "$APP_DIR/.git" ]; then
              rm -rf "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git fetch origin main
            git checkout main
            git reset --hard origin/main

            cat > .env.hostinger <<EOF
            OPENAI_API_KEY=${OPENAI_API_KEY}
            SEMANTIC_CACHE_ENABLED=${SEMANTIC_CACHE_ENABLED}
            CHROMA_OPENAI_API_KEY=${CHROMA_OPENAI_API_KEY}
            CHROMA_OPENAI_EMBEDDING_MODEL=${CHROMA_OPENAI_EMBEDDING_MODEL}
            CHROMA_API_KEY=${CHROMA_API_KEY}
            CHROMA_HOST=${CHROMA_HOST}
            CHROMA_TENANT=${CHROMA_TENANT}
            CHROMA_DATABASE=${CHROMA_DATABASE}
            R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
            R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
            R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
            R2_BUCKET=${R2_BUCKET}
            R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
            SKIP_UPLOAD=${SKIP_UPLOAD}
            PUBLIC_MEDIA_BASE_URL=${PUBLIC_MEDIA_BASE_URL}
            LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
            LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
            LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
            LANGFUSE_HOST=${LANGFUSE_HOST}
            LANGFUSE_TIMEOUT=${LANGFUSE_TIMEOUT}
            LANGFUSE_FLUSH_AT=${LANGFUSE_FLUSH_AT}
            LANGFUSE_FLUSH_INTERVAL=${LANGFUSE_FLUSH_INTERVAL}
            LANGFUSE_TRACING_ENVIRONMENT=${LANGFUSE_TRACING_ENVIRONMENT}
            LANGFUSE_AUTH_CHECK_ON_STARTUP=${LANGFUSE_AUTH_CHECK_ON_STARTUP}
            MANIM_RENDER_TIMEOUT_SECONDS=${MANIM_RENDER_TIMEOUT_SECONDS}
            MANIM_QUALITY_FLAG=${MANIM_QUALITY_FLAG}
            KEEP_RENDER_ARTIFACTS=${KEEP_RENDER_ARTIFACTS}
            EOF

            docker compose \
              --env-file .env.hostinger \
              -f docker-compose.hostinger.yml \
              up -d --build --remove-orphans
